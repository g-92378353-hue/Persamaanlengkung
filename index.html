<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <title>Misi Pengamiran: Persamaan Lengkung</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- MathJax -->
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
            svg: { fontCache: 'global' }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
    </script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-dark: #020617;
            --gold: #fbbf24;
            --success: #22c55e;
            --danger: #ef4444;
            --text-white: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            color: var(--text-white);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(56, 189, 248, 0.2);
            text-align: center;
            border: 2px solid rgba(251, 191, 36, 0.4);
        }

        h1 {
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.5);
        }

        .math-box {
            font-size: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 25px;
            border-radius: 12px;
            margin: 20px 0;
            border-left: 5px solid var(--gold);
            text-align: left;
        }

        input {
            width: 100%;
            padding: 16px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            text-align: center;
            margin-bottom: 10px;
        }

        .shake { animation: shake 0.4s ease-in-out; border-color: var(--danger); }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            font-size: 16px;
            font-weight: 800;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-main { background: linear-gradient(135deg, #fbbf24, #d97706); color: #020617; }
        .btn-hint { background: #38bdf8; color: white; }
        button:active { transform: scale(0.98); }

        .hint-section {
            background: rgba(30, 64, 175, 0.3);
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            display: none;
            border: 1px dashed var(--gold);
        }

        .message { margin-top: 20px; font-weight: 900; font-size: 1.5rem; height: 30px; }

        #leaderboard {
            margin-top: 30px;
            width: 100%;
            max-width: 650px;
            background: rgba(15, 23, 42, 0.8);
            padding: 15px;
            border-radius: 15px;
        }

        .victory-title { font-size: 4rem; color: var(--gold); font-weight: 900; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Liga Kalkulus</h1>

    <div id="start-screen">
        <p>Ejen Bijak, taip nama anda untuk mulakan seruan arena!</p>
        <input id="playerName" type="text" placeholder="Nama Anda..." autocomplete="off">
        <button class="btn-main" onclick="startGame()">MASUK ARENA</button>
    </div>

    <div id="game-screen" style="display:none">
        <h2 id="levelTitle" style="color: var(--gold);"></h2>
        <div class="math-box" id="questionBox"></div>
        <input id="answerInput" type="text" placeholder="Contoh: x^3-2x+5">
        <button class="btn-main" onclick="submitAnswer()">SERANG (HANTAR)</button>
        <button class="btn-hint" onclick="toggleHint()">BANTUAN HERO</button>
        <div class="hint-section" id="hintBox"></div>
        <div class="message" id="statusMessage"></div>
    </div>

    <div id="finish-screen" style="display:none">
        <div class="victory-title">VICTORY!</div>
        <h2 style="color: #fff;">MISI SELESAI!</h2>
        <p id="finalScoreText"></p>
        <button class="btn-main" onclick="location.reload()">MAIN LAGI</button>
    </div>
</div>

<div id="leaderboard">
    <h3>Top Legends</h3>
    <ul id="boardList" style="list-style: none; padding: 0;"></ul>
</div>

<!-- Audio Assets (MLBB Original Vibes) -->
<audio id="sfx-welcome" preload="auto">
    <source src="https://www.myinstants.com/media/sounds/welcome-to-mobile-legends-announcer.mp3" type="audio/mpeg">
</audio>
<audio id="sfx-correct" preload="auto">
    <source src="https://www.myinstants.com/media/sounds/double-kill-ml.mp3" type="audio/mpeg">
</audio>
<audio id="sfx-wrong" preload="auto">
    <source src="https://www.myinstants.com/media/sounds/mlbb-death.mp3" type="audio/mpeg">
</audio>
<audio id="sfx-victory" preload="auto">
    <source src="https://www.myinstants.com/media/sounds/victory-mlbb.mp3" type="audio/mpeg">
</audio>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyCtXEaVUfNLDQbeskXw-3EJ9KXUDynoBv8",
    authDomain: "missioncalculusgame.firebaseapp.com",
    databaseURL: "https://missioncalculusgame-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "missioncalculusgame",
    appId: "1:674496394742:web:66157f59baf2614a6e83d7"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const levels = [
    { question: `$\\frac{dy}{dx} = 3x^2 - 4x$. Melalui $(1, 2)$. Cari $y$.`, answer: "x^3-2x^2+3", hint: "Kamirkan jadi $x^3 - 2x^2 + C$. Masukkan (1,2) cari C." },
    { question: `$\\frac{dy}{dx} = 2x + 5$. Melalui $(0, 4)$. Cari $y$.`, answer: "x^2+5x+4", hint: "Pintasan-y (0,4) bermaksud $C = 4$." },
    { question: `$\\frac{dy}{dx} = 6x^2$. Melalui $(1, 5)$. Cari $y$.`, answer: "2x^3+3", hint: "Hasil kamiran: $2x^3 + C$. Selesaikan untuk C." }
];

let currentLevel = 0;
let currentPlayer = "";

function forcePlay(id) {
    const audio = document.getElementById(id);
    if (audio) {
        audio.pause();
        audio.currentTime = 0;
        // Gunakan timeout kecil untuk memastikan audio sedia
        setTimeout(() => {
            audio.play().catch(e => console.log("Audio Error:", e));
        }, 50);
    }
}

function startGame() {
    currentPlayer = document.getElementById("playerName").value.trim();
    if (!currentPlayer) return alert("Sila taip nama!");

    // Mainkan bunyi Welcome to MLBB
    forcePlay('sfx-welcome');

    document.getElementById("start-screen").style.display = "none";
    document.getElementById("game-screen").style.display = "block";
    loadLevel();
}

function loadLevel() {
    const q = levels[currentLevel];
    document.getElementById("levelTitle").innerText = "MISI " + (currentLevel + 1);
    document.getElementById("questionBox").innerHTML = q.question;
    document.getElementById("answerInput").value = "";
    document.getElementById("statusMessage").innerText = "";
    if (window.MathJax) MathJax.typesetPromise();
}

function submitAnswer() {
    const input = document.getElementById("answerInput");
    const userAns = input.value.toLowerCase().replace(/\s/g, '');
    const correctAns = levels[currentLevel].answer.toLowerCase().replace(/\s/g, '');

    if (userAns === correctAns) {
        forcePlay('sfx-correct'); // Double Kill
        document.getElementById("statusMessage").style.color = "var(--success)";
        document.getElementById("statusMessage").innerText = "🌟 BIJAK! TAHAP DITINGKATKAN!";
        
        currentLevel++;
        if (currentLevel >= levels.length) setTimeout(finishGame, 1000);
        else setTimeout(loadLevel, 1500);
    } else {
        forcePlay('sfx-wrong'); // Death sound
        if ("vibrate" in navigator) navigator.vibrate(200);
        input.classList.add("shake");
        setTimeout(() => input.classList.remove("shake"), 500);
        document.getElementById("statusMessage").style.color = "var(--danger)";
        document.getElementById("statusMessage").innerText = "❌ SALAH! CUBA LAGI.";
    }
}

function finishGame() {
    forcePlay('sfx-victory');
    document.getElementById("game-screen").style.display = "none";
    document.getElementById("finish-screen").style.display = "block";
    document.getElementById("finalScoreText").innerText = `Ejen ${currentPlayer}, anda adalah lagenda matematik!`;
}

function toggleHint() {
    const h = document.getElementById("hintBox");
    h.innerHTML = levels[currentLevel].hint;
    h.style.display = h.style.display === "none" ? "block" : "none";
}
</script>
</body>
</html>
